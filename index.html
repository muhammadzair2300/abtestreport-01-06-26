<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaySpare — A/B Test Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#0A0A0A;font-family:'DM Sans',sans-serif;}
  .shell{display:flex;flex-direction:column;height:100vh;}
  .header{
    background:#0A0A0A;border-bottom:3px solid #FFD600;
    display:flex;align-items:center;padding:0 28px;gap:24px;
    height:60px;flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0;}
  .brand-icon{
    width:36px;height:36px;background:#FFD600;
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:13px;color:#0A0A0A;
    clip-path:polygon(10% 0%,90% 0%,100% 10%,100% 90%,90% 100%,10% 100%,0% 90%,0% 10%);
  }
  .brand-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#FFD600;}
  .divider{width:1px;height:28px;background:#2a2a2a;flex-shrink:0;}
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#444;font-weight:700;flex-shrink:0;}
  .tabs{display:flex;align-items:center;gap:6px;flex:1;}
  .tab{
    display:flex;flex-direction:column;align-items:flex-start;
    padding:6px 18px;background:transparent;
    border:1px solid #2a2a2a;border-radius:5px;
    cursor:pointer;transition:all 0.12s ease;gap:3px;flex-shrink:0;
  }
  .tab:hover{background:#161616;border-color:#444;}
  .tab.active{background:#FFD600;border-color:#FFD600;}
  .t-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#888;line-height:1;}
  .tab.active .t-name{color:#0A0A0A;}
  .t-badge{font-size:9px;font-weight:700;letter-spacing:0.5px;padding:2px 7px;border-radius:2px;color:#fff;line-height:1.4;}
  .tab.active .t-badge{background:rgba(0,0,0,0.2)!important;color:#0A0A0A;}
  .frame-wrap{flex:1;position:relative;overflow:hidden;}
  #frame{width:100%;height:100%;border:none;display:block;background:#fff;}
  .loader{
    position:absolute;inset:0;background:#0A0A0A;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    z-index:20;transition:opacity 0.2s;
  }
  .loader.gone{opacity:0;pointer-events:none;}
  .loader-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:#FFD600;}
  .loader-track{width:200px;height:3px;background:#1f1f1f;border-radius:2px;overflow:hidden;}
  .loader-fill{height:100%;background:#FFD600;border-radius:2px;animation:fill 0.5s ease-out forwards;}
  @keyframes fill{from{width:0}to{width:100%}}
  .loader-text{font-size:10px;color:#444;letter-spacing:1px;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">PS</div>
      <div class="brand-name">PLAYSPARE</div>
    </div>
    <div class="divider"></div>
    <div class="eyebrow">A/B Reports</div>
    <div class="tabs">
      <button class="tab active" id="tab-premiumracks" onclick="show('premiumracks')" >
        <span class="t-name">Premium Racks</span>
        <span class="t-badge" style="background:var(--amb)">&#x23F8; Continue</span>
      </button>
      <button class="tab" id="tab-startedpack" onclick="show('startedpack')" >
        <span class="t-name">Starter Pack</span>
        <span class="t-badge" style="background:var(--red)">&#x26D4; Null Result</span>
      </button>
      <button class="tab" id="tab-viprushevent" onclick="show('viprushevent')" >
        <span class="t-name">VIP Rush Event</span>
        <span class="t-badge" style="background:#1B5E20">5 Sig Metrics &#x2605;</span>
      </button>
    </div>
    </div>
  <div class="frame-wrap">
    <div class="loader" id="loader">
      <div class="loader-logo">PLAYSPARE</div>
      <div class="loader-track"><div class="loader-fill"></div></div>
      <div class="loader-text">Loading report...</div>
    </div>
    <iframe id="frame" title="Report"></iframe>
  </div>
</div>

const NAMES = {premiumracks:'Premium Racks',startedpack:'Starter Pack',viprushevent:'VIP Rush Event'};

/* ── UTF-8 safe base64 decode ──────────────────────────────────────────────
   atob() only handles Latin-1. For UTF-8 content (emojis, special chars)
   we decode the raw bytes and run them through TextDecoder to get proper
   UTF-8 strings.
   ─────────────────────────────────────────────────────────────────────── */
function b64ToUtf8(b64) {
  const raw   = atob(b64);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

let current = null;

function show(id) {
  if (current === id) return;
  current = id;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');

  const loader = document.getElementById('loader');
  loader.classList.remove('gone');
  loader.innerHTML = `
    <div class="loader-logo">PLAYSPARE</div>
    <div class="loader-track"><div class="loader-fill"></div></div>
    <div class="loader-text">Loading ${NAMES[id]}...</div>
  `;

  const frame = document.getElementById('frame');
  frame.onload = () => setTimeout(() => loader.classList.add('gone'), 120);
  /* Use UTF-8-correct decode then set via srcdoc — no blob URL needed */
  frame.srcdoc = b64ToUtf8(DATA[id]);
}

show('premiumracks');
